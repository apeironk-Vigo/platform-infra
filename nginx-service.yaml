apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx # This MUST match the label in your deployment!
  ports:
    - protocol: TCP
      port: 80         # Port inside the cluster
      targetPort: 80   # Port on the Pod
      nodePort: 30080  # Port on your Lenovo (Range: 30000-32767)
  type: NodePort
